<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>旅結 開支助手</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0369a1; --gold: #fbbf24; }
        html, body { overscroll-behavior: none; height: 100%; width: 100%; overflow-x: hidden; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; transition: background 0.3s, color 0.3s; }
        .wano-bg { background-image: url('https://i.imgur.com/DRcZvHV.png'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; }
        /* 修改點 1：調整標題位置至約 2/5 處 */
        #launch-screen { background-image: url('https://i.imgur.com/cNRBKIW.jpeg'); background-size: cover; background-position: center; z-index: 100; transition: opacity 0.6s ease-out; display: flex; flex-direction: column; align-items: center; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); width: 100%; box-sizing: border-box; overflow: hidden; }
        input, select { box-sizing: border-box !important; font-size: 16px !important; max-width: 100%; }
        .tab-active { color: var(--navy); border-bottom: 3px solid var(--navy); font-weight: 700; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom, 30px); }
        #i_splitList { width: 100%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .modal-bg { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
        .pixelated { image-rendering: pixelated; }
    </style>
</head>
<body class="wano-bg">
    
    <div id="launch-screen" class="fixed inset-0">
        <div class="absolute top-[30%] left-0 w-full text-center px-8 -translate-y-1/2">
            <h1 class="text-5xl font-extrabold text-white tracking-tighter mb-4 [text-shadow:_0_4px_12px_rgba(0,0,0,0.5)]">
                旅結 <span class="text-3xl text-orange-400 italic">開支助手</span>
            </h1>
            <p class="text-white text-base opacity-80 uppercase tracking-[0.5em] [text-shadow:_0_2px_6px_rgba(0,0,0,0.3)]">Expense Manager</p>
        </div>
        
        <button onclick="enterApp()" class="absolute bottom-32 left-1/2 -translate-x-1/2 bg-white/10 backdrop-blur-xl text-white border border-white/30 px-14 py-4 rounded-full font-bold text-xl tracking-[0.3em] shadow-2xl active:scale-90 transition-transform">
            ENTER
        </button>
    </div>

    <div class="fixed inset-0 bg-white/60 -z-10"></div>

    <div id="app-content" class="hidden opacity-0 transition-opacity duration-500">
        <div id="view-home" class="relative max-w-md mx-auto px-5 pt-12 pb-20 z-10">
            <header class="mb-10 text-center relative">
                <h1 class="text-3xl font-extrabold text-sky-950 tracking-tighter">旅結 <span class="text-amber-500 italic">Pro</span></h1>
                <p class="text-gray-500 text-[10px] mt-1 uppercase tracking-[0.4em]">Expense Manager</p>
                <div class="mt-4 flex justify-center gap-2">
                    <button onclick="exportData()" class="text-[9px] bg-white/80 px-3 py-1 rounded-full shadow-sm border">匯出備份</button>
                    <button onclick="document.getElementById('importFile').click()" class="text-[9px] bg-white/80 px-3 py-1 rounded-full shadow-sm border">匯入還原</button>
                    <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                </div>
            </header>
        
            <div class="glass p-6 rounded-[2.5rem] shadow-xl mb-10">
                <h3 class="text-xs font-bold text-gray-700 mb-4 flex items-center gap-2">
                    <span class="w-1 h-3.5 bg-amber-400 rounded-full"></span> 建立新項目
                </h3>
               <input type="text" id="newTripInput" placeholder="項目名稱 (如：日本之旅)" class="w-full bg-white px-5 py-4 rounded-2xl focus:outline-none mb-4 border border-gray-100 shadow-sm">
                <button onclick="h_createTrip()" class="w-full bg-sky-950 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95">開始使用</button>
            </div>
            
            <div class="flex gap-4 mb-4 border-b border-gray-200">
                <button id="home-tab-active" onclick="renderHomeList('active')" class="pb-2 border-b-2 border-sky-900 font-bold text-sm">進行中</button>
                <button id="home-tab-archive" onclick="renderHomeList('archive')" class="pb-2 text-gray-400 text-sm">已封存</button>
            </div>
            <div id="h_tripList" class="space-y-4"></div>
        </div>

        <div id="view-detail" class="hidden relative max-w-md mx-auto px-5 pt-6 safe-pb z-10">
            <div class="flex items-center justify-between mb-5">
                <button onclick="h_goHome()" class="text-sky-900 text-sm flex items-center gap-1 font-bold shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M15 19l-7-7 7-7" /></svg> 返回
                </button>
                <h2 id="d_tripTitle" class="text-base font-extrabold text-sky-950 truncate mx-2"></h2>
                 <div class="flex gap-1">
                    <button onclick="h_archiveTrip()" id="archiveBtn" class="text-gray-500 text-[10px] bg-gray-100 px-2 py-2 rounded-full font-bold">封存</button>
                    <button onclick="h_copyMsg()" class="text-emerald-700 text-[11px] font-bold bg-emerald-100 px-3 py-2 rounded-full shrink-0">分享</button>
                </div>
            </div>

             <div id="capture-area" class="glass rounded-[2.5rem] p-6 shadow-xl mb-5 border border-white">
                <div class="h-40 w-full mb-3"><canvas id="d_chart"></canvas></div>
                <div class="text-center">
                    <p class="text-[9px] text-gray-400 uppercase tracking-widest mb-0.5">Total Amount (HKD)</p>
                    <h3 id="d_totalAmt" class="text-3xl font-black text-sky-950">$ 0.00</h3>
                </div>
            </div>

            <div class="flex mb-6 border-b border-gray-100 text-sm bg-white/40 backdrop-blur-md rounded-xl">
                <button onclick="h_switchTab('add')" id="tab-add" class="flex-1 py-4 tab-active">記帳</button>
                <button onclick="h_switchTab('list')" id="tab-list" class="flex-1 py-4 text-gray-400">紀錄</button>
                <button onclick="h_switchTab('settle')" id="tab-settle" class="flex-1 py-4 text-gray-400" onclick="h_settleUI()">結算</button>
                <button onclick="h_switchTab('mem')" id="tab-mem" class="flex-1 py-4 text-gray-400">成員</button>
            </div>

            <div id="p-add" class="space-y-4">
                <div class="flex gap-2">
                    <select id="i_cat" class="w-16 flex-none bg-white px-1 py-4 rounded-2xl shadow-sm border-none ring-1 ring-gray-100 text-center font-bold">
                        <option value="食">🍴</option><option value="住">🏨</option><option value="行">🚗</option>
                        <option value="玩">🎟️</option><option value="購">🛍️</option><option value="機">✈️</option>
                        <option value="雜">📦</option>
                    </select>
                    <div class="flex-1 min-w-0">
                        <input type="text" id="i_name" placeholder="項目名稱 (如：拉麵)" class="w-full bg-white px-5 py-4 rounded-2xl shadow-sm border-none ring-1 ring-gray-100">
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <div class="flex gap-2">
                        <input type="date" id="i_date" class="bg-white px-3 py-4 rounded-2xl shadow-sm border-none ring-1 ring-gray-100 text-xs">
                        <div class="relative flex-1">
                            <input type="number" id="i_amt" inputmode="decimal" placeholder="金額 (HKD)" class="w-full bg-white px-5 py-4 rounded-2xl shadow-sm border-none ring-1 ring-gray-100 font-bold pr-24">
                            <div class="absolute right-2 top-1/2 -translate-y-1/2 flex gap-1">
                                <button onclick="h_calcByHead()" class="bg-orange-100 text-orange-700 text-[9px] font-bold px-1.5 py-1.5 rounded-lg shadow-sm border border-orange-200">👥 按人頭</button>
                                <button onclick="toggleFxModal(true)" class="bg-sky-100 text-sky-700 text-[9px] font-bold px-1.5 py-1.5 rounded-lg shadow-sm border border-sky-200">🌐 匯率</button>
                            </div>
                        </div>
                    </div>
                </div>
                 
                <div class="glass p-5 rounded-3xl shadow-sm ring-1 ring-gray-50 space-y-4">
                    <div class="flex justify-between items-center text-sm font-bold">
                        <span class="text-gray-500 text-xs">誰付款？</span>
                        <select id="i_payer" class="w-auto min-w-[100px] bg-sky-50 px-3 py-2 rounded-xl text-sky-950 border-none"></select>
                    </div>
                    <hr class="border-gray-100">
                    <div class="flex justify-between items-center">
                         <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">分擔模式</p>
                        <select id="i_splitType" onchange="toggleSplitMode()" class="text-[10px] bg-gray-100 px-2 py-1 rounded-lg">
                            <option value="equal">均分</option>
                            <option value="custom">自定義金額</option>
                         </select>
                    </div>
                    <div id="i_splitList"></div>
                </div>
                <button onclick="h_saveExpense()" class="w-full bg-sky-950 text-white py-5 rounded-3xl font-bold shadow-lg active:opacity-80 transition-all">記錄開支</button>
            </div>

            <div id="p-list" class="hidden space-y-3">
                <button onclick="h_clearAll()" class="w-full py-2.5 text-[10px] text-red-500 border border-red-100 rounded-xl mb-3 font-bold bg-white/50">清空所有紀錄</button>
                <div id="d_expList" class="space-y-3"></div>
            </div>
            <div id="p-settle" class="hidden space-y-3">
                <div id="d_settleList" class="bg-white/95 rounded-3xl p-6 space-y-3 shadow-sm border border-gray-100"></div>
                <button onclick="generateImage()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold text-sm shadow-lg">生成結算長圖並分享</button>
            </div>
            <div id="p-mem" class="hidden space-y-4">
                <div class="bg-white/95 p-6 rounded-3xl shadow-sm border border-gray-50">
                     <p class="text-sm font-bold mb-4">管理成員</p>
                     <div class="flex flex-col gap-2 mb-6">
                        <input type="text" id="i_newMem" placeholder="旅伴名字" class="w-full bg-gray-50 px-4 py-3 rounded-xl border-none ring-1 ring-gray-100">
                         <div class="flex justify-between items-center">
                            <label class="text-xs text-gray-500">代表色：<input type="color" id="i_memColor" value="#0369a1" class="w-8 h-8 rounded-full border-none"></label>
                            <button onclick="h_addMember()" class="bg-sky-800 text-white px-8 py-3 rounded-xl text-xs font-bold">加入</button>
                         </div>
                    </div>
                    <div class="flex items-center gap-2 mb-4">
                        <span class="text-xs font-bold">預設付款人：</span>
                        <select id="i_defaultPayer" onchange="h_setDefaultPayer()" class="text-xs bg-gray-100 p-1 rounded"></select>
                    </div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">現有成員</p>
                    <div id="d_memList" class="flex flex-wrap gap-2"></div>
                </div>
             </div>
        </div>
    </div>

    <div id="fx-modal" class="hidden fixed inset-0 z-[200] modal-bg flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl relative">
            <h4 class="text-center font-bold text-sky-950 mb-6 flex justify-center items-center gap-2">即時匯率轉換</h4>
             <div class="space-y-4">
                 <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">選擇外幣與金額</label>
                    <div class="flex gap-2 mt-1">
                        <select id="fx_currency" onchange="fetchRate()" class="w-1/3 bg-sky-50 px-2 py-4 rounded-2xl border-none ring-1 ring-sky-100 text-xs font-bold text-sky-900 text-center">
                            <option value="JPY">JPY</option><option value="TWD">TWD</option><option value="EUR">EUR</option>
                            <option value="CNY">CNY</option><option value="KRW">KRW</option><option value="USD">USD</option>
                            <option value="GBP">GBP</option><option value="THB">THB</option>
                        </select>
                        <input type="number" id="fx_foreign" placeholder="外幣金額" class="w-2/3 bg-gray-50 p-4 rounded-2xl border-none ring-1 ring-gray-100 font-bold">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1 flex justify-between">
                        <span>當前匯率 (1 外幣 = ? HKD)</span>
                        <span id="fx_status" class="text-emerald-500"></span>
                    </label>
                    <input type="number" id="fx_rate" class="w-full bg-gray-50 p-4 rounded-2xl border-none ring-1 ring-gray-100 mt-1" placeholder="載入中...">
                </div>
                <div class="pt-4">
                    <button onclick="applyFx()" class="w-full bg-sky-950 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">確定轉換</button>
                    <button onclick="toggleFxModal(false)" class="w-full text-gray-400 text-xs mt-4">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allTrips = JSON.parse(localStorage.getItem('exp_v7_final')) || [];
        let activeIdx = -1;
        let myChart = null;
        let currentHomeTab = 'active';

        function h_saveData() { 
            localStorage.setItem('exp_v7_final', JSON.stringify(allTrips)); 
            renderHomeList(currentHomeTab);
            if(activeIdx !== -1) h_refreshDetail(); 
        }

        function enterApp() {
            const launch = document.getElementById('launch-screen');
            const content = document.getElementById('app-content');
            launch.style.opacity = '0';
            setTimeout(() => { 
                launch.classList.add('hidden'); 
                content.classList.remove('hidden'); 
                setTimeout(() => content.style.opacity = '1', 50); 
            }, 600);
            document.getElementById('i_date').valueAsDate = new Date();
        }

        // 修改點 2 的邏輯函數：按人頭計算
        function h_calcByHead() {
            const unitAmt = parseFloat(document.getElementById('i_amt').value);
            if (isNaN(unitAmt) || unitAmt <= 0) {
                alert("請先輸入每人的單價金額喵！");
                return;
            }
            // 獲取當前已勾選的分擔人數
            const checkedBoxes = document.querySelectorAll('#i_splitList input:checked');
            const count = checkedBoxes.length;
            
            if (count === 0) {
                alert("請先選擇分擔的成員喵！");
                return;
            }
            
            const total = (unitAmt * count).toFixed(2);
            document.getElementById('i_amt').value = total;
            // 輕微觸動提示
            console.log(`計算成功：${unitAmt} x ${count}人 = ${total}`);
        }

        // 備份功能
        function exportData() {
            const dataStr = JSON.stringify(allTrips);
            const blob = new Blob([dataStr], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `TravelExpress_Backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function importData(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if(Array.isArray(data)) {
                        allTrips = data;
                        h_saveData();
                        alert("還原成功！");
                    }
                } catch(err) { alert("無效的檔案"); }
            };
            reader.readAsText(file);
        }

        function h_createTrip() {
            const name = document.getElementById('newTripInput').value.trim();
            if(!name) return;
            allTrips.push({ 
                name, 
                members: [{n:"我", c:"#0369a1"}], 
                expenses: [], 
                isArchived: false,
                defaultPayer: "我"
            });
            h_saveData();
            document.getElementById('newTripInput').value = '';
            h_openTrip(allTrips.length - 1);
        }

        function h_openTrip(idx) {
            activeIdx = idx;
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-detail').classList.remove('hidden');
            const trip = allTrips[idx];
            document.getElementById('archiveBtn').innerText = trip.isArchived ? "取消封存" : "封存";
            h_refreshDetail();
            h_switchTab('add');
        }

        function h_archiveTrip() {
            allTrips[activeIdx].isArchived = !allTrips[activeIdx].isArchived;
            h_saveData();
            h_goHome();
        }

        function renderHomeList(type) {
            currentHomeTab = type;
            document.getElementById('home-tab-active').className = type === 'active' ? "pb-2 border-b-2 border-sky-900 font-bold text-sm" : "pb-2 text-gray-400 text-sm";
            document.getElementById('home-tab-archive').className = type === 'archive' ? "pb-2 border-b-2 border-sky-900 font-bold text-sm" : "pb-2 text-gray-400 text-sm";
            
            const container = document.getElementById('h_tripList');
            const filtered = allTrips.map((t, i) => ({...t, originalIdx: i})).filter(t => type === 'active' ? !t.isArchived : t.isArchived);
            container.innerHTML = filtered.length ?
            filtered.map(t => `
                <div onclick="h_openTrip(${t.originalIdx})" class="glass p-5 rounded-[2rem] flex justify-between items-center active:scale-95 transition-transform shadow-sm">
                    <div class="min-w-0 flex-1 mr-4">
                        <h4 class="font-bold text-sky-950 text-sm truncate">${t.name}</h4>
                        <p class="text-[10px] text-gray-400 mt-1">${t.members.length} 人 · ${t.expenses.length} 筆</p>
                    </div>
                    <button onclick="h_deleteTrip(${t.originalIdx}, event)" class="text-gray-300 text-xs px-2 shrink-0">刪除</button>
                </div>
            `).join('') : `
                <div class="flex flex-col items-center justify-center py-10 opacity-70">
                    <img src="https://i.imgur.com/bKq0Gsr.png" alt="旅結導覽貓" class="w-16 h-16 mb-2 pixelated">
                    <p class="text-center text-gray-500 text-xs font-bold tracking-widest">目前空空如也喵～</p>
                </div>
            `;
        }

        function h_goHome() {
            activeIdx = -1;
            document.getElementById('view-home').classList.remove('hidden');
            document.getElementById('view-detail').classList.add('hidden');
            renderHomeList(currentHomeTab);
        }

        function h_refreshDetail() {
            const trip = allTrips[activeIdx];
            if(!trip) return;
            document.getElementById('d_tripTitle').innerText = trip.name;
            const total = trip.expenses.reduce((s, e) => s + e.amt, 0);
            document.getElementById('d_totalAmt').innerText = `$ ${total.toFixed(2)}`;
            document.getElementById('i_payer').innerHTML = trip.members.map(m => `<option value="${m.n}" ${m.n === trip.defaultPayer ? 'selected':''}>${m.n}</option>`).join('');
            document.getElementById('i_defaultPayer').innerHTML = trip.members.map(m => `<option value="${m.n}" ${m.n === trip.defaultPayer ? 'selected':''}>${m.n}</option>`).join('');
            toggleSplitMode();
            renderExpenseList();
            renderMemberList();
            h_updateChart();
        }

        function toggleSplitMode() {
            const mode = document.getElementById('i_splitType').value;
            const trip = allTrips[activeIdx];
            const html = trip.members.map(m => `
                <div class="flex items-center gap-2 p-3 bg-white/80 rounded-xl text-[11px] font-bold shadow-sm ring-1 ring-gray-100">
                    <input type="checkbox" value="${m.n}" checked class="w-4 h-4 accent-sky-900" ${mode === 'custom' ? 'style="display:none"' : ''}>
                    <span class="w-3 h-3 rounded-full" style="background:${m.c}"></span>
                    <span class="truncate flex-1">${m.n}</span>
                    ${mode === 'custom' ? `<input type="number" step="0.1" placeholder="$" class="w-16 p-1 text-right bg-transparent border-b border-gray-200 i-split-amt">` : ''}
                </div>
            `).join('');
            document.getElementById('i_splitList').innerHTML = html;
        }

        function renderExpenseList() {
            const trip = allTrips[activeIdx];
            const groups = {};
            trip.expenses.forEach((e, idx) => {
                const d = e.date || "未指定日期";
                if(!groups[d]) groups[d] = [];
                groups[d].push({...e, originalIdx: idx});
            });
            const sortedDates = Object.keys(groups).sort((a,b) => new Date(b) - new Date(a));
            document.getElementById('d_expList').innerHTML = sortedDates.map(date => `
                <div class="space-y-2">
                    <p class="text-[10px] font-bold text-gray-400 pl-2 uppercase">${date}</p>
                    ${groups[date].map(e => `
                        <div class="bg-white/95 p-4 rounded-2xl flex justify-between items-center shadow-sm">
                            <div class="min-w-0 flex-1">
                                <p class="text-xs font-bold text-sky-950 truncate">${e.cat} | ${e.name}</p>
                                <p class="text-[9px] text-gray-400">付: ${e.payer} · 分: ${Object.keys(e.split).length}人</p>
                            </div>
                            <div class="flex items-center gap-3 shrink-0 ml-2">
                                <span class="font-bold text-sm text-sky-900">$${e.amt.toFixed(1)}</span>
                                <button onclick="h_deleteExp(${e.originalIdx})" class="text-red-200 text-lg px-2 active:scale-125 transition-transform">×</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function h_saveExpense() {
            const name = document.getElementById('i_name').value.trim() || "未命名";
            const amt = parseFloat(document.getElementById('i_amt').value);
            const date = document.getElementById('i_date').value;
            const cat = document.getElementById('i_cat').value;
            const payer = document.getElementById('i_payer').value;
            const mode = document.getElementById('i_splitType').value;
            
            let split = {};
            if(mode === 'equal') {
                const checked = Array.from(document.querySelectorAll('#i_splitList input:checked')).map(c => c.value);
                if(!checked.length) return alert("請選擇分擔對象");
                const share = amt / checked.length;
                checked.forEach(n => split[n] = share);
            } else {
                let totalSet = 0;
                document.querySelectorAll('.i-split-amt').forEach((input, i) => {
                    const val = parseFloat(input.value) || 0;
                    if(val > 0) {
                        const mName = allTrips[activeIdx].members[i].n;
                        split[mName] = val;
                        totalSet += val;
                    }
                });
                if(Math.abs(totalSet - amt) > 0.1) return alert(`金額不符！總額為 ${amt}，目前分配為 ${totalSet.toFixed(1)}`);
            }

            if(!amt) return alert("請輸入金額");
            allTrips[activeIdx].expenses.push({ name, amt, date, cat, payer, split });
            document.getElementById('i_name').value = '';
            document.getElementById('i_amt').value = '';
            h_saveData();
        }

        function h_addMember() {
            const n = document.getElementById('i_newMem').value.trim();
            const c = document.getElementById('i_memColor').value;
            if(n && !allTrips[activeIdx].members.find(m => m.n === n)) {
                allTrips[activeIdx].members.push({n, c});
                document.getElementById('i_newMem').value = '';
                h_saveData();
            }
        }

        function renderMemberList() {
            const trip = allTrips[activeIdx];
            document.getElementById('d_memList').innerHTML = trip.members.map((m, i) => `
                <div class="flex items-center gap-1 bg-sky-50 text-sky-800 pl-2 pr-1 py-1 rounded-full text-[10px] font-bold border border-sky-100">
                    <span class="w-2 h-2 rounded-full" style="background:${m.c}"></span>
                    <span>${m.n}</span>
                    ${trip.members.length > 1 ? `<button onclick="h_removeMember(${i})" class="w-5 h-5 flex items-center justify-center text-sky-300 hover:text-red-400 text-sm font-light">×</button>` : ''}
                </div>
            `).join('');
        }

        function h_setDefaultPayer() {
            allTrips[activeIdx].defaultPayer = document.getElementById('i_defaultPayer').value;
            h_saveData();
        }

        function h_settleUI() {
            const trip = allTrips[activeIdx];
            let bal = {}; 
            trip.members.forEach(m => bal[m.n] = 0);
            trip.expenses.forEach(e => {
                bal[e.payer] += e.amt;
                for(let p in e.split) { bal[p] -= e.split[p]; }
            });
            const res = document.getElementById('d_settleList');
            let g = [], r = [];
            for(let p in bal) { 
                if(bal[p] < -0.1) g.push({n:p, a:Math.abs(bal[p])});
                else if(bal[p] > 0.1) r.push({n:p, a:bal[p]}); 
            }
            
            if(!g.length) {
                res.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-6">
                        <img src="https://i.imgur.com/bKq0Gsr.png" alt="完美結算貓" class="w-20 h-20 mb-2 pixelated">
                        <p class="text-center text-emerald-600 text-sm font-bold">帳目平衡！太厲害了喵！🐾</p>
                    </div>`;
            } else {
                res.innerHTML = `
                    <div class="flex items-center justify-center gap-2 mb-4">
                        <img src="https://i.imgur.com/bKq0Gsr.png" alt="旅結導覽貓" class="w-10 h-10 pixelated">
                         <p class="text-[10px] font-bold text-gray-400 text-center uppercase tracking-widest">最佳轉帳方案 (HKD)</p>
                    </div>
                `;
                let g_temp = JSON.parse(JSON.stringify(g));
                let r_temp = JSON.parse(JSON.stringify(r));
                g_temp.forEach(gv => { 
                    r_temp.forEach(rv => { 
                        if(gv.a > 0.01 && rv.a > 0.01) { 
                            let v = Math.min(gv.a, rv.a); 
                            const gMem = trip.members.find(m => m.n === gv.n);
                            const rMem = trip.members.find(m => m.n === rv.n);
                            res.innerHTML += `
                                 <div class="flex justify-between items-center p-4 bg-sky-50 rounded-2xl border border-sky-100 shadow-sm mb-2">
                                    <span class="text-xs font-bold text-sky-950 flex items-center gap-1">
                                       <b style="color:${gMem.c}">${gv.n}</b> ➔ <b style="color:${rMem.c}">${rv.n}</b>
                                    </span>
                                    <b class="text-sky-900">$${v.toFixed(2)}</b>
                                 </div>`; 
                            gv.a -= v; rv.a -= v;
                        }
                    })
                });
            }
        }

        function h_switchTab(tab) {
            ['add', 'list', 'settle', 'mem'].forEach(t => { 
                document.getElementById(`p-${t}`).classList.add('hidden'); 
                document.getElementById(`tab-${t}`).className = "flex-1 py-4 text-gray-400"; 
            });
            document.getElementById(`p-${tab}`).classList.remove('hidden'); 
            document.getElementById(`tab-${tab}`).className = "flex-1 py-4 tab-active";
            if(tab === 'settle') h_settleUI();
        }

        function h_copyMsg() {
            const trip = allTrips[activeIdx];
            let msg = `💰 ${trip.name} 結算\n------------------\n`;
            let bal = {};
            trip.members.forEach(m => bal[m.n] = 0);
            trip.expenses.forEach(e => { bal[e.payer] += e.amt; for(let p in e.split) bal[p] -= e.split[p]; });
            let g = [], r = [];
            for(let p in bal) { if(bal[p] < -0.1) g.push({n:p, a:Math.abs(bal[p])});
            else if(bal[p] > 0.1) r.push({n:p, a:bal[p]}); }
            g.forEach(gv => { r.forEach(rv => { if(gv.a > 0.1 && rv.a > 0.1) { let v = Math.min(gv.a, rv.a); msg += `👉 ${gv.n} ➔ ${rv.n} : $${v.toFixed(2)}\n`; gv.a -= v; rv.a -= v; }})});
            navigator.clipboard.writeText(msg).then(() => alert("文本已複製！"));
        }

        async function generateImage() {
            const area = document.getElementById('capture-area');
            const canvas = await html2canvas(area, { backgroundColor: '#f0f9ff' });
            const imgData = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'settlement.png';
            link.href = imgData;
            link.click();
        }

        function h_updateChart() {
            const trip = allTrips[activeIdx];
            const cats = { '食': 0, '住': 0, '行': 0, '玩': 0, '購': 0, '機':0, '雜':0 };
            trip.expenses.forEach(e => cats[e.cat] = (cats[e.cat] || 0) + e.amt);
            const ctx = document.getElementById('d_chart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, { 
                type: 'doughnut', 
                data: { 
                    labels: Object.keys(cats).filter(k => cats[k] > 0), 
                    datasets: [{ 
                        data: Object.values(cats).filter(v => v > 0), 
                        backgroundColor: ['#fbbf24', '#38bdf8', '#818cf8', '#f87171', '#34d399', '#f472b6', '#94a3b8'], 
                        borderWidth: 0 
                    }] 
                }, 
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { position: 'right', labels: { boxWidth: 8, font: { size: 9 } } } }, 
                    cutout: '70%' 
                } 
            });
        }

        async function fetchRate() {
            const currency = document.getElementById('fx_currency').value;
            const rateInput = document.getElementById('fx_rate');
            const statusLabel = document.getElementById('fx_status');
            rateInput.value = "";
            rateInput.placeholder = "即時抓取中...";
            statusLabel.innerText = "連線中...";
            statusLabel.className = "text-sky-500";
            try {
                const res = await fetch(`https://open.er-api.com/v6/latest/${currency}`);
                const data = await res.json();
                if(data && data.rates && data.rates.HKD) {
                    rateInput.value = data.rates.HKD.toFixed(4);
                    statusLabel.innerText = "✓ 已更新";
                    statusLabel.className = "text-emerald-500";
                } else {
                    rateInput.placeholder = "抓取失敗，請手動輸入";
                    statusLabel.innerText = "✗ 失敗";
                }
            } catch(e) {
                rateInput.placeholder = "網路錯誤，請手動輸入";
                statusLabel.innerText = "✗ 斷線";
            }
        }

        function toggleFxModal(show) { 
            document.getElementById('fx-modal').classList.toggle('hidden', !show);
            if(show) fetchRate();
        }

        function applyFx() {
            const f = parseFloat(document.getElementById('fx_foreign').value);
            const r = parseFloat(document.getElementById('fx_rate').value);
            if(f && r) {
                document.getElementById('i_amt').value = (f * r).toFixed(2);
                document.getElementById('fx_foreign').value = '';
                toggleFxModal(false);
            } else {
                alert("請輸入外幣金額與確保匯率已載入");
            }
        }

        function h_deleteExp(idx) { if(confirm("刪除紀錄？")) { allTrips[activeIdx].expenses.splice(idx, 1);
        h_saveData(); } }
        function h_deleteTrip(idx, e) { e.stopPropagation(); if(confirm("確定刪除此整個行程項目？")) { allTrips.splice(idx, 1); h_saveData();
        } }
        function h_clearAll() { if(confirm("清空當前行程所有紀錄？")) { allTrips[activeIdx].expenses = []; h_saveData();
        } }
        function h_removeMember(idx) { if(confirm(`移除成員「${allTrips[activeIdx].members[idx].n}」？`)) { allTrips[activeIdx].members.splice(idx, 1); h_saveData();
        } }

        renderHomeList('active');
    </script>
</body>
</html>
